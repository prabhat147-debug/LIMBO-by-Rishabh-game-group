<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Limbo: The Dark Path - Rishabh Game Group</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Georgia', serif; }
        canvas { display: block; filter: blur(0.4px) contrast(1.2); }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, black 120%);
            pointer-events: none;
        }

        #controls {
            position: absolute; bottom: 30px; width: 100%; display: flex;
            justify-content: space-around; pointer-events: none;
        }

        .btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; 
            pointer-events: auto; display: flex; align-items: center; 
            justify-content: center; color: #444; font-size: 24px;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        #game-over {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: #ddd; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="jumpBtn">↑</div>
        <div class="btn" id="rightBtn">→</div>
    </div>

    <div id="game-over">
        <h2 style="letter-spacing: 8px; font-weight: 100;">LOST IN THE DARK</h2>
        <p style="color: #444; margin-bottom: 30px;">Developed by Rishabh game group</p>
        <button onclick="location.reload()" style="background:none; border: 1px solid #333; color: #888; padding: 12px 30px; cursor: pointer; letter-spacing: 2px;">AWAKEN</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameOverScreen = document.getElementById('game-over');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gravity = 0.6;
    let friction = 0.85;
    let gameActive = true;

    const player = {
        x: 50, y: 100, width: 25, height: 50,
        velX: 0, velY: 0, speed: 4, jumping: false, grounded: false
    };

    // Obstacles & Platforms
    const platforms = [
        { x: 0, y: canvas.height - 60, w: 500, h: 100 },      // Start Floor
        { x: 600, y: canvas.height - 60, w: 800, h: 100 },    // Second Floor
        { x: 250, y: canvas.height - 180, w: 100, h: 20 },    // Floating ledge
        { x: 1100, y: canvas.height - 180, w: 300, h: 20 }    // High ledge
    ];

    const boxes = [
        { x: 300, y: canvas.height - 110, w: 40, h: 40, velX: 0, velY: 0 } // Pushable Box
    ];

    const saws = [
        { x: 750, y: canvas.height - 60, radius: 35, angle: 0, speed: 0.1, range: 150, startX: 750 }
    ];

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Mobile Input
    const touch = (id, code) => {
        const b = document.getElementById(id);
        b.onpointerdown = (e) => { e.preventDefault(); keys[code] = true; };
        b.onpointerup = (e) => { e.preventDefault(); keys[code] = false; };
    };
    touch('leftBtn', 'ArrowLeft'); touch('rightBtn', 'ArrowRight'); touch('jumpBtn', 'Space');

    function update() {
        if (!gameActive) return;

        // Movement
        if (keys['ArrowRight']) player.velX < player.speed && player.velX++;
        if (keys['ArrowLeft']) player.velX > -player.speed && player.velX--;
        if ((keys['Space'] || keys['ArrowUp']) && player.grounded) {
            player.velY = -12;
            player.grounded = false;
        }

        player.velY += gravity;
        player.velX *= friction;
        player.grounded = false;

        // Box Physics & Collision
        boxes.forEach(box => {
            box.velY += gravity;
            box.velX *= friction;
            
            // Player pushing box
            if (player.x + player.width > box.x && player.x < box.x + box.w && 
                player.y + player.height > box.y && player.y < box.y + box.h) {
                if (player.x < box.x) box.velX = 2;
                if (player.x > box.x) box.velX = -2;
            }

            // Box floor collision
            platforms.forEach(p => {
                if (box.x < p.x + p.w && box.x + box.w > p.x && box.y + box.h > p.y && box.y < p.y + p.h) {
                    box.y = p.y - box.h;
                    box.velY = 0;
                }
            });
            box.x += box.velX; box.y += box.velY;
        });

        // Player/Platform/Box Collision
        let targets = [...platforms, ...boxes];
        targets.forEach(t => {
            let tw = t.w || t.width; let th = t.h || t.height;
            if (player.x < t.x + tw && player.x + player.width > t.x && 
                player.y + player.height > t.y && player.y < t.y + th) {
                if (player.velY > 0) {
                    player.grounded = true;
                    player.y = t.y - player.height;
                    player.velY = 0;
                }
            }
        });

        // Saw Animation & Collision
        saws.forEach(s => {
            s.angle += 0.2;
            s.x = s.startX + Math.sin(Date.now() * 0.002) * s.range;
            let dx = (player.x + 12) - s.x;
            let dy = (player.y + 25) - s.y;
            if (Math.sqrt(dx*dx + dy*dy) < s.radius) die();
        });

        player.x += player.velX;
        player.y += player.velY;

        if (player.y > canvas.height) die();

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Platforms
        ctx.fillStyle = "#000";
        platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

        // Draw Box
        ctx.strokeStyle = "#333";
        boxes.forEach(b => {
            ctx.fillStyle = "#050505";
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.strokeRect(b.x+5, b.y+5, b.w-10, b.h-10);
        });
